name: ci-accessibility-pa11y

on: [pull_request]

jobs:
  accessibility:
    permissions:
        contents: read
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Apply Django Migrations
      run: |
        cd django
        mv core/local_settings.test.py core/local_settings.py
        python manage.py migrate

    - name: Start Django development server
      run: |
        cd django
        python manage.py runserver 0.0.0.0:8000 &
      env:
        SECRET_KEY: 'dummy-key-for-ci-testing'
        DEBUG: 'True'

    - name: Wait for Django server to be ready
      run: npx wait-on http://localhost:8000/ --timeout 30000

    - name: Run pa11y-ci
      run: npx pa11y-ci
